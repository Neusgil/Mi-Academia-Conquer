<main>

<section>
  <h1>Registro</h1>
  <p>Completa el siguiente formulario para registrarte en la academia.</p>
  <form action="#" method="post">
    <p>
      <label for="nombre">Nombre completo</label><br>
      <input type="text" id="nombre" name="nombre" required>
    </p>
    <p>
      <label for="fecha-nacimiento">Fecha de nacimiento</label><br>
      <input type="date" id="fecha-nacimiento" name="fecha-nacimiento" required>
    </p>
    <p>
      <label for="email">Email</label><br>
      <input type="email" id="email" name="email" required>
    </p>
    <p>
      <label for="direccion">Dirección</label><br>
      <input type="text" id="direccion" name="direccion">
    </p>
    <p>
      <label for="web">Página web</label><br>
      <input type="url" id="web" name="web">
    </p>
    <p>
      <label for="foto">Foto</label><br>
      <input type="file" id="foto" name="foto" accept="image/*">
    </p>
    <p>
      <label for="biografia">Biografía</label><br>
      <textarea id="biografia" name="biografia" rows="6" cols="50"></textarea>
    </p>
    <p>
      <button type="submit">Enviar registro</button>
      <button type="reset">Limpiar formulario</button>
    </p>
  </form>
</section>
